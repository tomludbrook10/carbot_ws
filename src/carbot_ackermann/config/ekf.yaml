### ekf config file ###
ekf_node:
    ros__parameters:
        frequency: 30.0  ## ouput freq in hz. 
        two_d_mode: true ## use no 3d information in the estimate.
        publish_acceleration: true ## publishes the accleration. 
        publish_tf: true # publish the transform over the /tf topic.

        map_frame: map              # Defaults to "map" if unspecified
        odom_frame: odom            # Defaults to "odom" if unspecified
        base_link_frame: base_link  # Defaults to "base_link" if unspecified
        world_frame: odom           # Defaults to the value of odom_frame if unspecified

        odom0: wheel_odom
        odom0_config: [false, false, false,
                      false, false, false,
                      true, false, false, ## X velocity and 
                      false, false, true, ## Yaw velocity. 
                      false, false, false]

        imu0: imu
        imu0_config: [false, false, false,
                      false, false, true, ## Yaw angle.
                      false, false, false,
                      false, false, false, ## Yaw velocity.
                      false, false, false]